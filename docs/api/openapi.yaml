components:
  x-cloud-story-6-1-schemas:
    CloudSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CloudSettings'
    CloudSettings:
      type: object
      description: Safe metadata only. Credential JSON, private key, token, and raw credential path are never returned.
      required: [provider, drive_root_folder_id, folder_naming_template, credentials_configured, connection_status]
      properties:
        provider:
          type: string
          enum: [google_drive]
        drive_root_folder_id:
          type: string
        drive_root_folder_name:
          type: string
        folder_naming_template:
          type: string
          example: "{yyyy}/{mm}/{dd}/{safe_customer_name}/{safe_order_number}/{station_id}/{session_id}"
        credentials_configured:
          type: boolean
        connection_status:
          type: string
          enum: [not_configured, checking, authorized, failed]
        last_checked_at:
          type: string
          format: date-time
        last_error:
          type: string
          description: Sanitized operator-safe error only.
        last_error_code:
          type: string
          enum: [CLOUD_NOT_CONFIGURED, CLOUD_CREDENTIALS_INVALID, DRIVE_FOLDER_UNAVAILABLE, CLOUD_TARGET_RULE_INVALID, CLOUD_CHECK_FAILED]
        last_error_action:
          type: string
          enum: [FIX_CLOUD_CREDENTIALS, FIX_DRIVE_FOLDER, RETRY_CLOUD_CHECK, FIX_CLOUD_TARGET_RULES]
    CloudSettingsUpdateRequest:
      type: object
      description: Credential fields are write-only and handled only by the Go agent.
      required: [provider, drive_root_folder_id]
      properties:
        provider:
          type: string
          enum: [google_drive]
        drive_root_folder_id:
          type: string
        drive_root_folder_name:
          type: string
        service_account_json:
          type: string
          writeOnly: true
          description: Optional write-only service account JSON. Never returned or logged.
        credential_file_path:
          type: string
          writeOnly: true
          description: Optional server-local path consumed only by the Go agent. Never returned to browsers.
    CloudObjectKeyPreviewRequest:
      type: object
      required: [file_name]
      properties:
        target_root_prefix: { type: string }
        customer_name: { type: string }
        order_number: { type: string }
        station_id: { type: string }
        session_id: { type: string }
        asset_kind:
          type: string
          enum: [original, graded]
        file_name: { type: string }
    CloudObjectKeyPreviewResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [object_key, template]
          properties:
            object_key:
              type: string
              description: Sanitized deterministic Drive-safe virtual path preview; never starts with slash and rejects traversal.
            template:
              type: string
    CloudStatusUpdatedEvent:
      type: object
      description: SSE event `cloud.status_updated` with safe metadata only.
      properties:
        provider: { type: string, enum: [google_drive] }
        drive_root_folder_id: { type: string }
        drive_root_folder_name: { type: string }
        credentials_configured: { type: boolean }
        connection_status: { type: string, enum: [not_configured, checking, authorized, failed] }
        last_checked_at: { type: string, format: date-time }
        last_error_code: { type: string }
        last_error_action: { type: string }
  securitySchemes:
    localSessionCookie:
      type: apiKey
      in: cookie
      name: selfstudio_session
  responses:
    UnsupportedMediaType:
      description: Request Content-Type is not application/json
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidRequest:
      description: Login request body is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidPin:
      description: PIN/password is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyAttempts:
      description: Too many invalid PIN/password attempts
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AuthSessionFailed:
      description: The local session could not be created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ActivityUnavailable:
      description: Activity log store is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StationsUnavailable:
      description: Station configuration store is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InputFolderUnavailable:
      description: Station input folder is missing or unreadable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationCancelled:
      description: Watch validation was cancelled before completion
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationUnavailable:
      description: Watch validation service is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StationConfigUnavailable:
      description: Station configuration local storage is unavailable or backup failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StationRestoreFailed:
      description: Station restore failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidStationBackup:
      description: Station backup file or restore request is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InvalidSessionRequest:
      description: Session start request is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    SessionConflict:
      description: Session cannot start because one is already active or readiness blocks start
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IngestionUnavailable:
      description: Ingestion scan failed or scanner is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    SessionNotFound:
      description: Session was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    QuarantineNotFound:
      description: Quarantine item was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    QuarantineAssignmentConflict:
      description: Quarantine assignment is not allowed, conflicts with an existing route, or targets an ineligible session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    SessionsUnavailable:
      description: Session service or persistence is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ReadinessCheckFailed:
      description: Station readiness or health refresh failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ReadinessUnavailable:
      description: Event readiness checklist is unavailable or failed to compute
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unavailable:
              value:
                error:
                  code: READINESS_UNAVAILABLE
                  message: Event readiness belum siap.
                  action: Restart aplikasi lalu coba lagi.
                  details: {}
            failed:
              value:
                error:
                  code: READINESS_CHECK_FAILED
                  message: Event readiness check gagal dijalankan.
                  action: Coba recheck ulang atau restart aplikasi.
                  details: {}
    InvalidStationConfig:
      description: Station configuration payload is invalid. Duplicate folders use code `DUPLICATE_INPUT_FOLDER`; required/unsafe fields use code `INVALID_STATION_CONFIG`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    StationNotFound:
      description: Requested station does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PhotoNotFound:
      description: Requested photo does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UntrustedOrigin:
      description: Request origin is not trusted for cookie-authenticated mutation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Local operator session is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: Sesi operator tidak aktif.
              action: Login ulang dengan PIN/password operator.
              details: {}
  schemas:
    CloudSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CloudSettings'
    CloudSettings:
      type: object
      description: Safe metadata only. Credential JSON, private key, token, and raw credential path are never returned.
      required: [provider, drive_root_folder_id, folder_naming_template, credentials_configured, connection_status]
      properties:
        provider: { type: string, enum: [google_drive] }
        drive_root_folder_id: { type: string }
        drive_root_folder_name: { type: string }
        folder_naming_template:
          type: string
          example: "{yyyy}/{mm}/{dd}/{safe_customer_name}/{safe_order_number}/{station_id}/{session_id}"
        credentials_configured: { type: boolean }
        connection_status: { type: string, enum: [not_configured, checking, authorized, failed] }
        last_checked_at: { type: string, format: date-time }
        last_error: { type: string, description: Sanitized operator-safe error only. }
        last_error_code: { type: string }
        last_error_action: { type: string }
    CloudSettingsUpdateRequest:
      type: object
      description: Credential fields are write-only and handled only by the Go agent.
      required: [provider, drive_root_folder_id]
      properties:
        provider: { type: string, enum: [google_drive] }
        drive_root_folder_id: { type: string }
        drive_root_folder_name: { type: string }
        service_account_json:
          type: string
          writeOnly: true
          description: Optional write-only service account JSON. Never returned or logged.
        credential_file_path:
          type: string
          writeOnly: true
          description: Optional server-local path consumed only by the Go agent. Never returned to browsers.
    CloudObjectKeyPreviewRequest:
      type: object
      required: [file_name]
      properties:
        target_root_prefix: { type: string }
        customer_name: { type: string }
        order_number: { type: string }
        station_id: { type: string }
        session_id: { type: string }
        asset_kind: { type: string, enum: [original, graded] }
        file_name: { type: string }
    CloudObjectKeyPreviewResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [object_key, template]
          properties:
            object_key: { type: string, description: Sanitized deterministic Drive-safe virtual path preview; never starts with slash and rejects traversal. }
            template: { type: string }
    CloudStatusUpdatedEvent:
      type: object
      description: SSE event `cloud.status_updated` with safe metadata only.
      properties:
        provider: { type: string, enum: [google_drive] }
        drive_root_folder_id: { type: string }
        drive_root_folder_name: { type: string }
        credentials_configured: { type: boolean }
        connection_status: { type: string, enum: [not_configured, checking, authorized, failed] }
        last_checked_at: { type: string, format: date-time }
        last_error_code: { type: string }
        last_error_action: { type: string }
    DataResponse:
      type: object
      required:
        - data
      properties:
        data:
          description: Endpoint-specific success payload.
    HealthResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - service
            - status
            - database
            - worker
            - disk
          properties:
            service:
              type: string
              example: selfstudio-agent
            status:
              $ref: '#/components/schemas/HealthStatusValue'
            database:
              $ref: '#/components/schemas/HealthComponentStatus'
            worker:
              $ref: '#/components/schemas/HealthComponentStatus'
            disk:
              $ref: '#/components/schemas/HealthComponentStatus'
    HealthStatusValue:
      type: string
      enum:
        - ok
        - warning
        - error
        - placeholder
        - unknown
      example: ok
    HealthComponentStatus:
      type: object
      required:
        - status
        - label
        - action
      properties:
        status:
          $ref: '#/components/schemas/HealthStatusValue'
        label:
          type: string
          example: Database belum dikonfigurasi
        action:
          type: string
          example: Konfigurasi Supabase pada story database berikutnya.
    AuthSessionResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - authenticated
          properties:
            authenticated:
              type: boolean
              example: true
    StationListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - stations
          properties:
            stations:
              type: array
              minItems: 3
              maxItems: 3
              items:
                $ref: '#/components/schemas/Station'
    StationResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - station
          properties:
            station:
              $ref: '#/components/schemas/Station'
    Station:
      type: object
      required:
        - station_id
        - name
        - device_identifier
        - input_folder
        - background_name
        - default_lut_path
        - output_rule
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
          example: station_1
        name:
          type: string
          example: Main Camera
        device_identifier:
          type: string
          example: Sony A6000 Main
        input_folder:
          type: string
          example: D:\\Selfstudio\\input\\main
        background_name:
          type: string
          example: White
        default_lut_path:
          type: string
          example: D:\\Selfstudio\\luts\\default.cube
        output_rule:
          type: string
          example: '{customer_name}/{order_number}/{station_id}'
        camera_assignment:
          $ref: '#/components/schemas/CameraAssignment'
    DetectedGPhoto2Camera:
      type: object
      required: [identity_key, name, port, transport, runtime, connected, detected_at]
      properties:
        identity_key:
          type: string
          example: wsl|usb:001,004|sony_alpha_a6000
        name:
          type: string
          example: Sony Alpha-A6000
        model:
          type: string
        port:
          type: string
          example: usb:001,004
        device_path:
          type: string
        bus_id:
          type: string
        transport:
          type: string
          enum: [usb, ptp, unknown]
        runtime:
          type: string
          enum: [native_windows, wsl, unknown]
        connected:
          type: boolean
        diagnostics:
          type: array
          items:
            type: string
        detected_at:
          type: string
          format: date-time
    GPhoto2DiscoveryResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status, action, runtime, cameras, diagnostics, scanned_at]
          properties:
            status:
              type: string
              enum: [ready, no_cameras, gphoto2_missing, wsl_missing, usbipd_check_needed, error]
            action:
              type: string
              enum: [NONE, INSTALL_GPHOTO2, CHECK_WSL, CHECK_USBIPD, CONNECT_CAMERA, RETRY_CAMERA_DISCOVERY, CHECK_CAMERA_USB_MODE]
            runtime:
              type: string
              enum: [native_windows, wsl, unknown]
            cameras:
              type: array
              items:
                $ref: '#/components/schemas/DetectedGPhoto2Camera'
            diagnostics:
              type: array
              items:
                type: string
            scanned_at:
              type: string
              format: date-time
    CameraAssignment:
      type: object
      required: [identity_key, camera_name, port, runtime, assigned_at, connected]
      properties:
        identity_key:
          type: string
        camera_name:
          type: string
        port:
          type: string
        runtime:
          type: string
          enum: [native_windows, wsl, unknown]
        assigned_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        connected:
          type: boolean
    CameraAssignmentRequest:
      type: object
      required: [identity_key, camera_name, port, runtime, connected]
      properties:
        identity_key:
          type: string
        camera_name:
          type: string
        port:
          type: string
        runtime:
          type: string
        connected:
          type: boolean
    HardwareSmokeRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [local_only, drive_optional, drive_verify]
          default: local_only
        stop_on_failure:
          type: boolean
          default: true
        timeout_ms:
          type: integer
          minimum: 1000
        allow_active_session:
          type: boolean
          default: false
        restore_previous_listener_state:
          type: boolean
          default: false
    HardwareSmokeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [report]
          properties:
            report:
              $ref: '#/components/schemas/HardwareSmokeReport'
    HardwareSmokeReport:
      type: object
      required: [report_id, started_at, overall_status, mode, stop_on_failure, station_id, station_name, camera, steps, summary, next_action]
      properties:
        report_id:
          type: string
        report_file:
          type: string
          description: Safe local report file name only, not an absolute path.
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        overall_status:
          type: string
          enum: [passed, failed, warning, aborted]
        mode:
          type: string
          enum: [local_only, drive_optional, drive_verify]
        stop_on_failure:
          type: boolean
        station_id:
          type: string
        station_name:
          type: string
        camera:
          $ref: '#/components/schemas/SafeSmokeCamera'
        session_id:
          type: string
        file_name:
          type: string
          description: Basename only.
        steps:
          type: array
          items:
            $ref: '#/components/schemas/HardwareSmokeStep'
        summary:
          $ref: '#/components/schemas/HardwareSmokeSummary'
        next_action:
          type: string
    SafeSmokeCamera:
      type: object
      required: [camera_name, camera_id, assigned, connected]
      properties:
        camera_name:
          type: string
        camera_id:
          type: string
          description: Safe opaque summary, never raw identity_key or raw gPhoto2 port.
        assigned:
          type: boolean
        connected:
          type: boolean
    HardwareSmokeStep:
      type: object
      required: [step_key, status, started_at, duration_ms, message]
      properties:
        step_key:
          type: string
          enum: [station_config_loaded, camera_assignment_verified, gphoto2_discovery, camera_connected_verified, listener_started_or_running, operator_physical_shutter_prompted, downloaded_file_detected_in_input_folder, ingestion_verified, local_original_verified, graded_processing_verified, drive_upload_verified_or_skipped, report_saved]
        status:
          type: string
          enum: [pending, running, passed, failed, skipped, warning]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
        station_id:
          type: string
        file_name:
          type: string
        count:
          type: integer
        result:
          type: string
        error_code:
          type: string
        error_action:
          type: string
          enum: [ASSIGN_CAMERA, INSTALL_GPHOTO2, CHECK_WSL, CHECK_USBIPD, CONNECT_CAMERA, CHECK_CAMERA_USB_MODE, RETRY_TETHER_LISTENER, PRESS_SHUTTER_OR_CHECK_CAMERA, CHECK_WATCHER, CONFIGURE_DRIVE_OPTIONAL, RETRY_PROCESSING, CHECK_LUT]
        message:
          type: string
          description: Sanitized operator-safe message; never raw stdout/stderr, command, absolute path, token, identity key, or privileged command output.
    HardwareSmokeSummary:
      type: object
      properties:
        ingestion_count:
          type: integer
        ingestion_result:
          type: string
        local_original_result:
          type: string
        local_original_file:
          type: string
        graded_processing_result:
          type: string
        graded_file:
          type: string
        drive_status:
          type: string
          enum: [skipped, not_configured, pending, uploaded, failed]
        drive_required:
          type: boolean
        duration_ms:
          type: integer
        failure_code:
          type: string
        failure_action:
          type: string
    TetherListenerResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [listener, settings, recovery]
          properties:
            listener:
              $ref: '#/components/schemas/TetherListener'
            settings:
              $ref: '#/components/schemas/TetherListenerSettings'
            recovery:
              $ref: '#/components/schemas/TetherRecoveryStatus'
    TetherListenerSettings:
      type: object
      required: [station_id, desired_state, auto_restart_enabled, updated_at]
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        desired_state:
          type: string
          enum: [running, stopped]
          description: Persisted operator intent; unexpected process exit does not change running to stopped.
        auto_restart_enabled:
          type: boolean
          description: Defaults false. Auto recovery starts only when true and desired_state is running.
        last_started_at:
          type: string
          format: date-time
        last_stopped_at:
          type: string
          format: date-time
        last_recovery_attempt_at:
          type: string
          format: date-time
        recovery_attempt_count:
          type: integer
        updated_at:
          type: string
          format: date-time
    TetherRecoveryStatus:
      type: object
      required: [station_id, status, attempt_count, message, updated_at]
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        status:
          type: string
          enum: [idle, scheduled, attempting, succeeded, failed, paused]
        attempt_count:
          type: integer
        next_attempt_at:
          type: string
          format: date-time
        last_error_code:
          type: string
        last_error_action:
          type: string
          enum: [ASSIGN_CAMERA, CHECK_STATION_INPUT_FOLDER, INSTALL_GPHOTO2, CHECK_WSL, CHECK_USBIPD, CONNECT_CAMERA, CHECK_CAMERA_USB_MODE, START_TETHER_LISTENER, STOP_TETHER_LISTENER, RETRY_TETHER_LISTENER]
        message:
          type: string
          description: Sanitized safe summary only; no raw shell output, commands, path, port identity, token, or privileged command output.
        updated_at:
          type: string
          format: date-time
    TetherListener:
      type: object
      required: [station_id, status, message]
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        status:
          type: string
          enum: [stopped, starting, running, stopping, error]
        runtime:
          type: string
          enum: [native_windows, wsl, unknown]
        camera_name:
          type: string
        started_at:
          type: string
          format: date-time
        stopped_at:
          type: string
          format: date-time
        last_capture_at:
          type: string
          format: date-time
        last_downloaded_file_name:
          type: string
          description: Basename only; absolute path is never exposed.
        last_error_code:
          type: string
        last_error_action:
          type: string
          enum: [ASSIGN_CAMERA, CHECK_STATION_INPUT_FOLDER, INSTALL_GPHOTO2, CHECK_WSL, CHECK_USBIPD, CONNECT_CAMERA, CHECK_CAMERA_USB_MODE, START_TETHER_LISTENER, STOP_TETHER_LISTENER, RETRY_TETHER_LISTENER]
        message:
          type: string
          description: Sanitized operator-safe diagnostic; no raw stdout/stderr, command line, credentials, or absolute paths.
        already_running:
          type: boolean
          description: Present on duplicate start no-op.
    UpdateStationRequest:
      type: object
      required:
        - name
        - device_identifier
        - input_folder
        - background_name
        - default_lut_path
        - output_rule
      properties:
        name:
          type: string
        device_identifier:
          type: string
        input_folder:
          type: string
        background_name:
          type: string
        default_lut_path:
          type: string
        output_rule:
          type: string
    EventReadinessResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - readiness
          properties:
            readiness:
              $ref: '#/components/schemas/EventReadiness'
      example:
        data:
          readiness:
            status: warning
            label: Event belum sepenuhnya terverifikasi otomatis
            action: Konfirmasi item warning/placeholder sebelum event.
            checked_at: '2026-05-18T10:30:00Z'
            session_start_available: false
            session_start_action: Session start belum tersedia sampai story session control selesai dan required readiness aman.
            items:
              - category: stations
                item_key: station_1
                status: warning
                label: Station 1 butuh verifikasi device
                action: Pastikan kamera/tether software menulis JPG ke input folder.
              - category: cloud
                item_key: google_drive
                status: placeholder
                label: Google Drive belum dicek otomatis
                action: Google Drive upload akan divalidasi di Epic 6.
    EventReadiness:
      type: object
      required:
        - status
        - label
        - action
        - checked_at
        - session_start_available
        - session_start_action
        - items
      properties:
        status:
          $ref: '#/components/schemas/EventReadinessStatus'
        label:
          type: string
        action:
          type: string
        checked_at:
          type: string
          format: date-time
        session_start_available:
          type: boolean
        session_start_action:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventReadinessItem'
    EventReadinessItem:
      type: object
      required:
        - category
        - item_key
        - status
        - label
        - action
      properties:
        category:
          type: string
          enum: [stations, storage, cloud, operator]
        item_key:
          type: string
        status:
          $ref: '#/components/schemas/EventReadinessStatus'
        label:
          type: string
        action:
          type: string
    EventReadinessStatus:
      type: string
      enum: [ready, warning, failed, unknown, placeholder]
    WatchValidationRequest:
      type: object
      properties:
        timeout_ms:
          type: integer
          minimum: 1000
          maximum: 15000
          default: 5000
        stability_ms:
          type: integer
          minimum: 200
          maximum: 3000
          default: 500
    WatchValidationResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [validation]
          properties:
            validation:
              $ref: '#/components/schemas/WatchValidation'
    WatchValidation:
      type: object
      required: [station_id, status, label, action, source_path, detected_at, stable_at, validated_at, validation_only]
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        status:
          type: string
          enum: [ready, running, success, warning, failed]
        label:
          type: string
        action:
          type: string
        source_path:
          type: string
          nullable: true
          description: Internal/local source path used by the agent. Operator UI must render only a sanitized basename or safe file label, never the raw absolute path.
        detected_at:
          type: string
          format: date-time
          nullable: true
        stable_at:
          type: string
          format: date-time
          nullable: true
        validated_at:
          type: string
          format: date-time
        validation_only:
          type: boolean
          example: true
    StationBackupResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [backup]
          properties:
            backup:
              type: object
              required: [filename, created_at, station_count]
              properties:
                filename:
                  type: string
                  example: stations-20260518-103000.json
                created_at:
                  type: string
                  format: date-time
                station_count:
                  type: integer
                  example: 3
    StationRestoreRequest:
      type: object
      required: [filename]
      properties:
        filename:
          type: string
          example: stations-20260518-103000.json
    StationRestoreResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [restored, station_count]
          properties:
            restored:
              type: boolean
            station_count:
              type: integer
              example: 3
    EndSessionRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [manual, timer]
          example: manual
    StartSessionRequest:
      type: object
      required: [customer_name, order_number, timer_seconds]
      properties:
        customer_name:
          type: string
          example: Customer A
        order_number:
          type: string
          example: ORD-001
        timer_seconds:
          type: integer
          minimum: 60
          maximum: 86400
          example: 900
    IngestionScanResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [photos, routed_photos, quarantined_photos, errors]
          properties:
            photos:
              type: array
              items:
                $ref: '#/components/schemas/DetectedPhoto'
            routed_photos:
              type: array
              description: Server-owned successful routing results for detected photos. Frontend must not decide active-session ownership.
              items:
                $ref: '#/components/schemas/PhotoRouteResult'
            quarantined_photos:
              type: array
              description: Durable quarantine records for stable JPGs that must not be assigned to a session.
              items:
                $ref: '#/components/schemas/QuarantinedPhoto'
            errors:
              type: array
              items:
                $ref: '#/components/schemas/StationScanError'
    DetectedPhoto:
      type: object
      required: [station_id, source_path, size_bytes, detected_at, stable_at, status]
      properties:
        station_id:
          type: string
        source_path:
          type: string
        size_bytes:
          type: integer
        detected_at:
          type: string
          format: date-time
        stable_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [detected]
    PhotoRouteResult:
      type: object
      required: [station_id, source_path, source_size_bytes, detected_at, stable_at, status, duplicate]
      properties:
        photo_id:
          type: string
          example: photo_0123456789abcdef01234567
        station_id:
          type: string
        session_id:
          type: string
        source_path:
          type: string
        source_size_bytes:
          type: integer
        detected_at:
          type: string
          format: date-time
        stable_at:
          type: string
          format: date-time
        routed_at:
          type: string
          format: date-time
        quarantined_at:
          type: string
          format: date-time
        reason:
          type: string
          enum: [no_active_session, late_photo]
        status:
          type: string
          enum: [routed, quarantined, unassigned_pending_quarantine]
        local_original_path:
          type: string
          description: Verified local original JPG path after original-save success.
        original_save_status:
          type: string
          enum: [pending, saving, saved_original, failed]
        last_error:
          type: string
          description: Safe actionable original-save error when failed.
        attempt_count:
          type: integer
        original_save_started_at:
          type: string
          format: date-time
        original_saved_at:
          type: string
          format: date-time
        processing_status:
          type: string
          enum: [not_eligible, eligible]
          description: Graded/LUT work is not eligible until original_save_status is saved_original.
        local_graded_path:
          type: string
          description: Verified local graded JPG path after LUT processing success.
        graded_processing_status:
          type: string
          enum: [not_eligible, pending, processing, processed, failed]
        graded_last_error:
