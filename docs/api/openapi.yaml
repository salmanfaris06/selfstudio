        end_reason:
          type: string
          enum: [manual, timer]
          nullable: true
    StationSnapshot:
      type: object
      required: [station_name, background_name, default_lut_path, input_folder, output_rule, output_folder, device_identifier]
      properties:
        station_name:
          type: string
        background_name:
          type: string
        default_lut_path:
          type: string
        input_folder:
          type: string
        output_rule:
          type: string
        output_folder:
          type: string
        device_identifier:
          type: string
    StationReadinessResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - readiness
          properties:
            readiness:
              $ref: '#/components/schemas/StationReadiness'
      example:
        data:
          readiness:
            station_id: station_1
            status: warning
            label: Station butuh verifikasi operator
            action: Pastikan device/tether aktif sebelum event.
            checked_at: '2026-05-18T10:30:00Z'
            checks:
              - check_key: input_folder
                status: ready
                label: Input folder bisa dibaca
                action: Tidak ada aksi diperlukan.
              - check_key: output_folder
                status: ready
                label: Output folder sesuai rule bisa ditulis
                action: Tidak ada aksi diperlukan.
              - check_key: default_lut
                status: ready
                label: File LUT ditemukan dan bisa dibaca
                action: Tidak ada aksi diperlukan.
              - check_key: device
                status: unknown
                label: Device identifier belum diverifikasi otomatis
                action: Pastikan kamera/tether software menulis JPG ke input folder.
    StationReadiness:
      type: object
      required:
        - station_id
        - status
        - label
        - action
        - checked_at
        - checks
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        status:
          $ref: '#/components/schemas/ReadinessStatus'
        label:
          type: string
        action:
          type: string
        checked_at:
          type: string
          format: date-time
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessCheck'
    ReadinessCheck:
      type: object
      required:
        - check_key
        - status
        - label
        - action
      properties:
        check_key:
          type: string
          description: >-
            Existing keys remain present: input_folder, output_folder, default_lut, device. Camera-aware
            readiness may add gphoto2_availability, camera_assignment, camera_connected, tether_listener,
            input_folder_writable, and camera_test_capture. Camera failures are warning by default and become
            failed when SELFSTUDIO_CAMERA_READINESS_REQUIRED=true.
          enum: [input_folder, output_folder, default_lut, device, gphoto2_availability, camera_assignment, camera_connected, tether_listener, input_folder_writable, camera_test_capture]
        status:
          $ref: '#/components/schemas/ReadinessStatus'
        label:
          type: string
        action:
          type: string
    ReadinessStatus:
      type: string
      enum: [ready, warning, failed, unknown]
    CameraTestCaptureResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [test_capture]
          properties:
            test_capture:
              $ref: '#/components/schemas/CameraTestCaptureResult'
    CameraTestCaptureResult:
      type: object
      required: [station_id, status, label, action, validation_only]
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        status:
          type: string
          enum: [not_run, running, success, warning, failed]
        label:
          type: string
          description: Sanitized operator-facing result; no raw stdout/stderr, command, credentials, or absolute paths.
        action:
          type: string
          enum: [INSTALL_GPHOTO2, CHECK_WSL, CHECK_USBIPD, CONNECT_CAMERA, CHECK_CAMERA_USB_MODE, ASSIGN_CAMERA, START_TETHER_LISTENER, STOP_TETHER_LISTENER, CHECK_STATION_INPUT_FOLDER, RETRY_CAMERA_DISCOVERY, RETRY_TEST_CAPTURE, RECHECK_CAMERA_READINESS, NONE]
        file_name:
          type: string
          description: Safe basename only, never an absolute local/WSL path.
        captured_at:
          type: string
          format: date-time
        detected_at:
          type: string
          format: date-time
        stable_at:
          type: string
          format: date-time
        validation_only:
          type: boolean
          description: True because pipeline source of truth remains the local folder watcher; Drive upload is not invoked directly.
    ActivityListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - entries
          properties:
            entries:
              type: array
              items:
                $ref: '#/components/schemas/ActivityEntry'
    ActivityEntry:
