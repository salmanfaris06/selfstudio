  /api/stations/{station_id}/camera-test-capture:
    post:
      summary: Run explicit gPhoto2 camera test capture through station input folder
      description: >-
        Requires auth and trusted origin. The agent writes one collision-safe JPG to the station input folder,
        waits for the expected filename through watcher validation semantics, validates non-empty JPEG SOI bytes,
        and returns validation-only data. It never uploads directly to Drive and never creates photo, session,
        processing, quarantine, or upload jobs directly. If SELFSTUDIO_CAMERA_READINESS_REQUIRED=true, failed
        camera readiness can block session start; default is false for safe dev/local setup.
      operationId: runStationCameraTestCapture
      security:
        - localSessionCookie: []
      parameters:
        - in: path
          name: station_id
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      responses:
        '200':
          description: Camera test capture completed and expected JPG was detected by watcher validation path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraTestCaptureResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '404':
          $ref: '#/components/responses/StationNotFound'
