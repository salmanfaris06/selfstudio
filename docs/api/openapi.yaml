            - action
            - details
          properties:
            code:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: Sesi operator tidak aktif.
            action:
              type: string
              example: Login ulang dengan PIN/password operator.
            details:
              type: object
              additionalProperties: true
