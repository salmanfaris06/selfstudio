  /api/stations/{station_id}/hardware-smoke-tests:
    post:
      summary: Run guided real-hardware gPhoto2 event smoke test
      description: >-
        Requires auth and trusted origin. Orchestrates existing camera discovery, tether listener, station input folder,
        watcher/ingestion/processing state, and optional Google Drive status. It does not delete camera/input/output/quarantine/report/Drive files,
        does not run privileged usbipd/install/driver/global-kill commands, does not bypass folder watcher ingestion, and returns only safe report fields
        with basename file names and no raw ports, identity keys, absolute paths, commands, stdout/stderr, or tokens. Hardware pass must be validated manually with a real camera.
      operationId: runStationHardwareSmokeTest
      security:
        - localSessionCookie: []
      parameters:
        - in: path
          name: station_id
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HardwareSmokeRequest'
      responses:
        '200':
          description: Smoke completed and report was saved locally.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HardwareSmokeResponse'
        '202':
          description: Smoke failed or aborted safely; partial report was saved and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HardwareSmokeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '404':
          $ref: '#/components/responses/StationNotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
