                readinessCheckFailed:
                  value:
                    error:
                      code: READINESS_CHECK_FAILED
                      message: Readiness check gagal dijalankan.
                      action: Coba recheck ulang atau restart aplikasi.
                      details: {}
  /api/stations/{station_id}/readiness/check:
