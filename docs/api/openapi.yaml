openapi: 3.1.0
info:
  title: Selfstudio Agent API
  version: 0.1.0
  description: Local Go service API for Selfstudio operator dashboard. Auth secrets and service credentials stay server-side in the Go agent environment.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Get local agent health compatibility endpoint
      operationId: getHealthCompatibility
      responses:
        '200':
          description: Agent is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/health:
    get:
      summary: Get local agent health
      operationId: getHealth
      responses:
        '200':
          description: Agent is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /events:
    get:
      summary: Subscribe to local agent server-sent events
      operationId: subscribeEvents
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: SSE stream accepted
          content:
            text/event-stream:
              schema:
                type: string
                description: Each `data:` frame is a JSON-encoded EventEnvelope.
              example: |
                id: evt_0123456789abcdef0123456789abcdef
                event: health.updated
                data: {"event_id":"evt_0123456789abcdef0123456789abcdef","event_type":"health.updated","entity_type":"service","entity_id":"selfstudio-agent","occurred_at":"2026-05-18T10:30:00Z","data":{"status":"ok"}}
                
                event: ingestion.recovered
                data: {"event_id":"evt_recovery","event_type":"ingestion.recovered","entity_type":"ingestion","entity_id":"startup","occurred_at":"2026-05-19T10:30:00Z","data":{"recovered_routed_photos":1,"recovered_quarantine_items":1,"skipped_duplicates":2,"unresolved_conflicts":0,"errors":0}}

                event: processing.recovered
                data: {"event_id":"evt_processing_recovered","event_type":"processing.recovered","entity_type":"startup","entity_id":"startup","occurred_at":"2026-05-19T10:30:20Z","data":{"verified":2,"resumed":1,"failed":0,"skipped_retry_limit":1,"errors":0}}

                event: upload.recovered
                data: {"event_id":"evt_upload_recovered","event_type":"upload.recovered","entity_type":"startup","entity_id":"upload","occurred_at":"2026-05-19T10:30:25Z","data":{"recovered_pending":1,"resumed":1,"failed_missing_local":0,"verified_uploaded":2,"unverified_uploaded":0,"requires_cloud_check":0,"errors":0}}
                # Google Drive recovery event is published only after upload job state is durably saved; payload excludes local paths and credentials.

                event: photo.processing_started
                data: {"event_id":"evt_started","event_type":"photo.processing_started","entity_type":"photo","entity_id":"photo_0123456789abcdef01234567","occurred_at":"2026-05-19T10:30:30Z","data":{"photo_id":"photo_0123456789abcdef01234567","station_id":"station_1","session_id":"sess_0123456789abcdef01234567","status":"processing","graded_processing_status":"processing"}}
                # Startup recovery and retries reuse photo.processing_started, photo.processed/photo.processing_failed, and queue.updated with safe IDs only.

                event: photo.processed
                data: {"event_id":"evt_processed","event_type":"photo.processed","entity_type":"photo","entity_id":"photo_0123456789abcdef01234567","occurred_at":"2026-05-19T10:31:00Z","data":{"photo_id":"photo_0123456789abcdef01234567","station_id":"station_1","session_id":"sess_0123456789abcdef01234567","status":"processed","graded_processing_status":"processed"}}

                event: photo.processing_failed
                data: {"event_id":"evt_failed","event_type":"photo.processing_failed","entity_type":"photo","entity_id":"photo_0123456789abcdef01234567","occurred_at":"2026-05-19T10:32:00Z","data":{"photo_id":"photo_0123456789abcdef01234567","station_id":"station_1","session_id":"sess_0123456789abcdef01234567","status":"failed","graded_processing_status":"failed"}}

                event: queue.updated
                data: {"event_id":"evt_queue","event_type":"queue.updated","entity_type":"photo","entity_id":"photo_0123456789abcdef01234567","occurred_at":"2026-05-19T10:32:01Z","data":{"photo_id":"photo_0123456789abcdef01234567","station_id":"station_1","session_id":"sess_0123456789abcdef01234567","graded_processing_status":"failed"}}
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/cloud/settings:
    get:
      summary: Get safe cloud storage settings metadata
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Safe cloud settings metadata; credentials are never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudSettingsResponse'
    put:
      summary: Store Google Drive folder rules and write-only server-side credentials
      security:
        - localSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudSettingsUpdateRequest'
      responses:
        '200':
          description: Settings stored; response excludes credential material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudSettingsResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/cloud/settings/check:
    post:
      summary: Check server-side Google Drive authorization and folder access
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Cloud connection authorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudSettingsResponse'
        '400':
          description: Actionable cloud check failure without secret leakage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/sessions/{session_id}/cloud-target:
    get:
      summary: Get session-level cloud target status
      description: Returns Google Drive folder target identity for a session when already resolved. Does not upload original or graded JPG files.
      security:
        - localSessionCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session cloud target status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCloudTargetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/sessions/{session_id}/cloud-target/resolve:
    post:
      summary: Resolve deterministic session-level Google Drive folder target
      description: Uses folder convention `{yyyy}/{mm}/{dd}/{safe_customer_name}/{safe_order_number}/{station_id}/{session_id}` under the configured Drive root and stores one idempotent Drive folder identity per session. Upload jobs store per-file Drive IDs.
      security:
        - localSessionCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session cloud target resolved or existing ready target returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCloudTargetResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '409':
          description: Cloud not configured, unauthorized, target rule invalid, local completion pending, or target save failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{session_id}/uploads:
    get:
      summary: List per-file cloud upload jobs for a session
      description: Returns upload status for original and graded JPG files, separate from local save/processing status. Payload contains no cloud credentials, tokens, private keys, or raw privileged cloud errors.
      security:
        - localSessionCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Per-session upload status and per-file jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUploadsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/sessions/{session_id}/uploads/start:
    post:
      summary: Start background upload for locally completed session JPGs
      description: Enqueues original and eligible graded JPG uploads into Drive `original`/`graded` subfolders under the resolved session folder. The request path does not perform large blocking uploads. Retry/de-dup use deterministic job identity plus exact Drive parent folder and safe file name, and public responses expose Drive file/folder IDs instead of GCS bucket/object identity.
      security:
        - localSessionCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Upload worker accepted jobs for background processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUploadsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '409':
          description: UPLOAD_PENDING_LOCAL_COMPLETION, CLOUD_TARGET_NOT_READY, UPLOAD_LOCAL_FILE_MISSING, or UPLOAD_FAILED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/uploads/{job_id}/retry:
    post:
      summary: Retry one failed cloud upload job asynchronously
      description: Authenticated trusted-origin mutation. Reuses deterministic `(session_id, photo_id, asset_kind)` job_id and the same deterministic Drive parent folder and safe file name; accepted work runs asynchronously. Attempts are capped at 3 total per job. Running/uploaded duplicate clicks return safe no-op metadata instead of starting another upload. Does not upload large files in the request path and does not expose credentials or raw privileged cloud errors.
      security:
        - localSessionCookie: []
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Retry accepted or duplicate-safe no-op represented in returned status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUploadsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '404':
          description: UPLOAD_JOB_NOT_FOUND.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: UPLOAD_NOT_RETRYABLE, UPLOAD_LOCAL_FILE_MISSING, UPLOAD_FAILED, or UPLOAD_RETRY_STATE_SAVE_FAILED. UPLOAD_ALREADY_RUNNING and UPLOAD_ALREADY_UPLOADED are returned as 202 duplicate-safe no-op results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{session_id}/uploads/retry:
    post:
      summary: Retry all failed/retryable cloud upload jobs for a session asynchronously
      description: Authenticated trusted-origin mutation. Starts background retry workers only for persisted retryable jobs and never scans output folders freely. Attempts are capped at 3 total per job. Already running/uploaded jobs are not accepted as retry candidates except as safe no-op responses. Startup recovery normalizes stale uploading/retrying jobs as interrupted and recoverable; it never assumes them uploaded after restart.
      security:
        - localSessionCookie: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '202':
          description: Retry accepted for one or more jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionUploadsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '409':
          description: No retryable jobs or state save failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cloud/settings/object-key-preview:
    post:
      summary: Preview deterministic sanitized Google Drive folder/file path
      security:
        - localSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudObjectKeyPreviewRequest'
      responses:
        '200':
          description: Sanitized object key preview.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudObjectKeyPreviewResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/auth/login:
    post:
      summary: Create a local authenticated operator session
      operationId: loginLocalOperator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pin
              properties:
                pin:
                  type: string
                  description: Local operator PIN/password. Never exposed by the API.
                  example: change-this-local-pin
      responses:
        '200':
          description: Login accepted and session cookie set
          headers:
            Set-Cookie:
              description: HttpOnly local session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/InvalidPin'
        '429':
          $ref: '#/components/responses/TooManyAttempts'
        '500':
          $ref: '#/components/responses/AuthSessionFailed'
  /api/auth/logout:
    post:
      summary: Clear the local authenticated operator session
      operationId: logoutLocalOperator
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/auth/session:
    get:
      summary: Get current local operator session state
      operationId: getLocalOperatorSession
      responses:
        '200':
          description: Current local session state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /api/activity:
    get:
      summary: Fetch recent safe operator activity log entries
      operationId: getActivityLog
      security:
        - localSessionCookie: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - in: query
          name: action_type
          schema:
            type: string
          example: login.success
      responses:
        '200':
          description: Recent activity log entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityListResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ActivityUnavailable'
  /api/cameras/gphoto2/discover:
    post:
      summary: Safely discover gPhoto2 cameras via native or WSL runtime
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Discovery completed; zero cameras is a safe success with CONNECT_CAMERA action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPhoto2DiscoveryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '503':
          description: gPhoto2 or WSL unavailable with safe next action.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/stations:
    get:
      summary: Fetch the three logical camera stations
      operationId: getStations
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Station configuration list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/StationsUnavailable'
  /api/stations/{station_id}:
    put:
      summary: Update one logical camera station
      operationId: updateStation
      security:
        - localSessionCookie: []
      parameters:
        - in: path
          name: station_id
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStationRequest'
      responses:
        '200':
          description: Station updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationResponse'
        '400':
          $ref: '#/components/responses/InvalidStationConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '404':
          $ref: '#/components/responses/StationNotFound'
        '500':
          $ref: '#/components/responses/StationsUnavailable'
  /api/stations/{station_id}/camera-assignment:
    put:
      summary: Assign a detected gPhoto2 camera identity to one station
      security:
        - localSessionCookie: []
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraAssignmentRequest'
      responses:
        '200':
          description: Assignment saved and persisted with station config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationResponse'
        '400':
          $ref: '#/components/responses/InvalidStationConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '409':
          description: Camera identity already assigned to another station.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: DUPLICATE_CAMERA_ASSIGNMENT
                  message: Kamera sudah dipakai station lain.
                  action: CHOOSE_DIFFERENT_CAMERA
                  details: {}
  /api/stations/{station_id}/tether-listener:
    get:
      summary: Get sanitized gPhoto2 tether listener status for one station
      description: Returns listener state plus persisted desired state, auto-restart setting, and bounded recovery summary. Diagnostics are sanitized; absolute paths, raw commands, tokens, and multiline stderr are not exposed. Folder watcher remains the ingestion source of truth.
      security:
        - localSessionCookie: []
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      responses:
        '200':
          description: Current listener status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TetherListenerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/stations/{station_id}/tether-listener/start:
    post:
      summary: Start supervised gPhoto2 wait-event/download listener for one station
      description: Requires persisted camera assignment and writable station input folder. Duplicate start is a safe 200 no-op with already_running=true and sets desired_state=running. No install, driver, USB attach/setup, shell, privileged command, direct ingestion, Drive upload, or file deletion is run.
      security:
        - localSessionCookie: []
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      responses:
        '200':
          description: Listener started or already running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TetherListenerResponse'
        '400':
          description: Missing assignment, invalid runtime/port, or input folder not writable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_assignment:
                  value:
                    error:
                      code: CAMERA_ASSIGNMENT_REQUIRED
                      message: Camera assignment required before starting tether listener.
                      action: ASSIGN_CAMERA
                      details: {}
                unwritable_folder:
                  value:
                    error:
                      code: STATION_INPUT_FOLDER_UNWRITABLE
                      message: Station input folder is not writable.
                      action: CHECK_STATION_INPUT_FOLDER
                      details: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/stations/{station_id}/tether-listener/stop:
    post:
      summary: Stop only the station-owned gPhoto2 tether listener process
      description: Cancels the station listener context and process tracked by the supervisor, sets desired_state=stopped, and cancels pending tether recovery. It does not run global process-kill commands, WSL shutdown, install, driver, USB setup commands, ingestion bypass, Drive upload, or file deletion.
      security:
        - localSessionCookie: []
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      responses:
        '200':
          description: Listener stopped or already stopped.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TetherListenerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/stations/{station_id}/tether-listener/retry:
    post:
      summary: Manually retry safe tether listener reconnect for one station
      description: Authenticated trusted-origin retry sets desired_state=running, respects duplicate-start safety, uses the persisted station assignment/input folder only, and never runs privileged usbipd/install/driver/global-kill actions.
      security:
        - localSessionCookie: []
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      responses:
        '200':
          description: Retry attempted or listener already running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TetherListenerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/stations/{station_id}/tether-listener/settings:
    put:
      summary: Update tether listener non-secret recovery settings
      description: Updates auto_restart_enabled. Automatic startup/unexpected-exit restart is attempted only when desired_state=running and auto_restart_enabled=true. Default is false.
      security:
        - localSessionCookie: []
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            enum: [station_1, station_2, station_3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [auto_restart_enabled]
              properties:
                auto_restart_enabled:
                  type: boolean
      responses:
        '200':
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TetherListenerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
  /api/stations/backup:
    post:
      summary: Create station configuration backup
      operationId: backupStations
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Backup created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationBackupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '500':
          $ref: '#/components/responses/StationConfigUnavailable'
  /api/stations/restore:
    post:
      summary: Restore station configuration backup
      operationId: restoreStations
      security:
        - localSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StationRestoreRequest'
      responses:
        '200':
          description: Backup restored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationRestoreResponse'
        '400':
          $ref: '#/components/responses/InvalidStationBackup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/StationRestoreFailed'
  /api/ingestion/scan:
    post:
      summary: Scan station input folders for stable JPG files
      operationId: runIngestionScan
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Stable JPG scan result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionScanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/UntrustedOrigin'
        '500':
          $ref: '#/components/responses/IngestionUnavailable'
  /api/sessions:
    get:
      summary: List sessions for live station cards
      operationId: listSessions
      security:
        - localSessionCookie: []
      responses:
        '200':
          description: Sessions listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
