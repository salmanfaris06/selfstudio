            summary:
              $ref: '#/components/schemas/StationQuarantineSummary'
    StationQuarantineSummary:
      type: object
      required: [station_id, station_quarantine_count]
      properties:
        station_id:
          type: string
          enum: [station_1, station_2, station_3]
        station_quarantine_count:
          type: integer
          description: Open/unassigned quarantine count for this station, excluding assigned records.
          example: 1
        latest_quarantine_reason:
          type: string
          enum: [no_active_session, late_photo]
          description: Latest station quarantine reason category when available.
    SessionSummary:
      type: object
      required: [local_output_folder, photo_count, failures, quarantine_count, station_quarantine_count, upload_status, drive_target_status, drive_target_identity, drive_session_folder_id, drive_folder_path, drive_root_folder_id, drive_root_folder_name, drive_last_error_code, drive_last_error_action]
      properties:
        local_output_folder:
          type: string
        photo_count:
          type: integer
          example: 0
        failures:
          type: integer
          example: 0
        quarantine_count:
          type: integer
          description: Quarantine count related to this session.
          example: 0
        station_quarantine_count:
          type: integer
          description: Total quarantine count for the station, including no-active-session context.
          example: 1
        latest_quarantine_reason:
          type: string
          enum: [no_active_session, late_photo]
          description: Latest station quarantine reason category when available.
        upload_status:
          $ref: '#/components/schemas/SessionUploadStatus'
        drive_target_status:
          type: string
          enum: [pending, resolving, ready, failed]
          description: Google Drive folder target status, separate from upload/local processing status.
        drive_target_identity:
          type: string
          description: Stable Drive target identity; equals final session folder ID when ready.
        drive_session_folder_id:
          type: string
          description: Final Google Drive session folder ID.
        drive_folder_path:
          type: string
          description: Deterministic display/debug Drive folder path.
        drive_root_folder_id:
          type: string
        drive_root_folder_name:
          type: string
        drive_last_error_code:
          type: string
        drive_last_error_action:
          type: string
    SessionUploadStatus:
      type: string
      enum: [not_configured, target_pending, pending, uploading, uploaded, partial_failed, failed, pending_local_completion]
      description: Aggregate per-session cloud file upload status, separate from local save/processing status.
    FileUploadJob:
      type: object
      required: [job_id, session_id, station_id, photo_id, asset_kind, status, attempt_count, created_at, updated_at]
      description: Per-file Google Drive upload job API DTO. Does not contain credential material, tokens, service account JSON, private keys, credential paths, raw privileged Drive errors, or full local filesystem paths. Drive identity is represented by drive_folder_id and drive_file_id; legacy bucket/object fields may be omitted or compatibility-only.
      properties:
        job_id: { type: string }
        session_id: { type: string }
        station_id: { type: string }
        photo_id: { type: string }
        asset_kind:
          type: string
          enum: [original, graded]
        local_file_name:
          type: string
          description: Safe basename-only local file reference; full local filesystem paths are never exposed.
        bucket_name: { type: string, description: Legacy compatibility field; not the primary Drive identity. }
        object_key:
          type: string
          description: Legacy/virtual compatibility path; not the primary Drive identity.
        drive_folder_id:
          type: string
          description: Google Drive parent folder ID used for the file upload (`original` or `graded` subfolder).
        drive_file_id:
          type: string
          description: Google Drive file ID returned by the upload.
        remote_identity: { type: string, description: Mirrors or contains the Drive file ID after upload. }
        status:
          type: string
          enum: [pending, uploading, retrying, retry_scheduled, uploaded, failed, not_eligible]
        attempt_count: { type: integer }
        max_attempts: { type: integer, example: 3 }
        retry_after: { type: integer, description: Seconds until next automatic retry attempt. }
        next_retry_at: { type: string, format: date-time }
        last_attempt_at: { type: string, format: date-time }
        dedupe_key: { type: string, description: Safe deterministic identity matching job_id. }
        remote_generation: { type: integer, format: int64 }
        remote_metageneration: { type: integer, format: int64 }
        remote_etag: { type: string }
        last_error_code: { type: string, enum: [UPLOAD_JOB_NOT_FOUND, UPLOAD_NOT_RETRYABLE, UPLOAD_ALREADY_RUNNING, UPLOAD_ALREADY_UPLOADED, UPLOAD_LOCAL_FILE_MISSING, UPLOAD_RETRY_STATE_SAVE_FAILED, UPLOAD_FAILED, DRIVE_UPLOAD_FAILED, DRIVE_UPLOAD_UNAUTHORIZED, DRIVE_FOLDER_UNAVAILABLE, UPLOAD_CONFLICT, UPLOAD_OBJECT_CHECK_NEEDED, UPLOAD_REMOTE_CHECK_NEEDED] }
        last_error_action: { type: string, enum: [RETRY_CLOUD_UPLOAD, RETRY_DRIVE_UPLOAD, CHECK_LOCAL_OUTPUT, CHECK_CLOUD_OBJECT, CHECK_DRIVE_FILE, RESOLVE_CLOUD_TARGET, FIX_DRIVE_CREDENTIALS, FIX_DRIVE_FOLDER] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        uploaded_at: { type: string, format: date-time }
    SessionUploadsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [session_id, upload_status, jobs]
          properties:
            session_id: { type: string }
            upload_status:
              $ref: '#/components/schemas/SessionUploadStatus'
            session_upload_status:
              $ref: '#/components/schemas/SessionUploadStatus'
              description: Compatibility alias returned by retry endpoints.
            accepted:
              type: boolean
              description: Present on retry responses; true means one or more background retry workers were started.
            noop_reason:
              type: string
              enum: [UPLOAD_ALREADY_RUNNING, UPLOAD_ALREADY_UPLOADED, UPLOAD_NOT_RETRYABLE, UPLOAD_LOCAL_FILE_MISSING]
              description: Present on retry no-op responses.
            jobs:
              type: array
              items:
                $ref: '#/components/schemas/FileUploadJob'
    SessionCloudTargetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [cloud_target]
          properties:
            cloud_target:
              $ref: '#/components/schemas/SessionCloudTarget'
    SessionCloudTarget:
      type: object
      required: [session_id, station_id, status]
      description: Google Drive folder target identity. No service account, token, credential path, local full photo path, original JPG, or graded JPG is exposed/uploaded by Story 6.7.
      properties:
        session_id: { type: string }
        station_id: { type: string }
        bucket_name: { type: string }
        target_root_prefix: { type: string }
        object_prefix:
          type: string
          description: Deterministic session prefix: `{target_root_prefix}/{yyyy}/{mm}/{dd}/{safe_customer_name}/{safe_order_number}/{station_id}/{session_id}`.
        drive_root_folder_id: { type: string }
        drive_root_folder_name: { type: string }
        drive_folder_path:
          type: string
          description: Deterministic display path `{yyyy}/{mm}/{dd}/{safe_customer_name}/{safe_order_number}/{station_id}/{session_id}`.
        drive_session_folder_id:
          type: string
          description: Final Google Drive session folder ID.
        drive_folder_chain:
          type: array
          items:
            type: object
            properties:
              level: { type: string }
              name: { type: string }
              folder_id: { type: string }
              parent_id: { type: string }
        remote_identity:
          type: string
          description: Stable remote identity; for Google Drive this equals `drive_session_folder_id`.
        status:
          type: string
          enum: [pending, resolving, ready, failed]
        attempt_count: { type: integer }
        last_error_code:
          type: string
          enum: [CLOUD_NOT_CONFIGURED, CLOUD_NOT_AUTHORIZED, CLOUD_TARGET_RULE_INVALID, CLOUD_PREFIX_RESOLVE_FAILED, CLOUD_TARGET_SAVE_FAILED, CLOUD_PENDING_LOCAL_COMPLETION]
        last_error_action:
          type: string
          enum: [FIX_DRIVE_CREDENTIALS, RETRY_DRIVE_CHECK, FIX_DRIVE_FOLDER_RULES, RETRY_DRIVE_FOLDER, FIX_DRIVE_FOLDER, WAIT_FOR_LOCAL_COMPLETION]
        last_checked_at: { type: string, format: date-time }
        resolved_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CloudTargetResolvedEvent:
      type: object
      description: SSE event `cloud.target_resolved` / `cloud.target_failed`; safe metadata only.
      properties:
        session_id: { type: string }
        station_id: { type: string }
        status: { type: string, enum: [ready, failed] }
        drive_root_folder_id: { type: string }
        drive_root_folder_name: { type: string }
        drive_folder_path: { type: string }
        drive_session_folder_id: { type: string }
        remote_identity: { type: string }
        last_error_code: { type: string }
        last_error_action: { type: string }
    SessionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [sessions, recovered]
          properties:
            sessions:
              type: array
              description: Sessions recovered from durable local state; expired active sessions may be returned as locked after restart-safe recovery.
              items:
                $ref: '#/components/schemas/Session'
            recovered:
              type: boolean
              description: True when response reflects backend durable session state recovery.
    SessionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [session]
          properties:
            session:
              $ref: '#/components/schemas/Session'
    Session:
      type: object
      required: [session_id, station_id, status, customer_name, order_number, timer_seconds, started_at, ends_at, station_snapshot]
      properties:
        session_id:
          type: string
          example: sess_abc123
        station_id:
          type: string
          example: station_1
        status:
          type: string
          enum: [active, locked]
          example: active
        customer_name:
          type: string
        order_number:
          type: string
        timer_seconds:
          type: integer
        started_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        station_snapshot:
