  /api/processing/queue:
    get:
      summary: Get server-owned processing queue and per-photo status
      operationId: getProcessingQueue
      description: Startup recovery verifies persisted original/graded file state before serving queue state. Pending or stale processing jobs with a verified original are resumed asynchronously; failed jobs retry automatically only while `graded_attempt_count` is below 3; failed jobs at the automatic limit remain failed for manual operator retry.
      security:
        - localSessionCookie: []
      parameters:
        - in: query
          name: station_id
          schema:
            type: string
          description: Optional safe station identifier filter.
        - in: query
          name: session_id
          schema:
            type: string
          description: Optional safe session identifier filter.
        - in: query
          name: status
          schema:
            type: string
            enum: [not_eligible, pending, processing, processed, failed, retrying]
          description: Optional queue bucket filter. `processed` is the succeeded state.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
          description: Optional positive item limit.
      responses:
        '200':
          description: Processing queue summary and latest matching items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingQueueResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ReadinessUnavailable'
  /api/photos/{photo_id}/retry-processing:
    post:
      summary: Manually retry failed graded photo processing
      operationId: retryPhotoProcessing
      description: Requires an authenticated operator and trusted origin. Retry starts asynchronously from the verified `local_original_path`; ImageMagick/LUT work is not run inside the HTTP request. Automatic retry stops before the fourth total graded attempt; manual retry is explicit operator action and may run after that limit when the original is verified.
      security:
        - localSessionCookie: []
      parameters:
        - in: path
          name: photo_id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Retry accepted and background processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryProcessingResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
