        occurred_at:
          type: string
          format: date-time
        action_type:
          type: string
          example: login.success
        result:
          type: string
          enum:
            - success
            - failure
        message:
          type: string
          example: Operator login berhasil.
        station_id:
          type:
            - string
            - 'null'
        session_id:
          type:
            - string
            - 'null'
    ConfigPlaceholderResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - recorded
          properties:
            recorded:
              type: boolean
              example: true
    EventEnvelope:
      type: object
      required:
        - event_id
        - event_type
        - entity_type
        - entity_id
        - occurred_at
        - data
      properties:
        event_id:
          type: string
          example: evt_0123456789abcdef0123456789abcdef
        event_type:
          type: string
          example: health.updated
        entity_type:
          type: string
          example: service
        entity_id:
          type: string
          example: selfstudio-agent
        occurred_at:
          type: string
          format: date-time
          example: '2026-05-18T10:30:00Z'
        data:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - error
